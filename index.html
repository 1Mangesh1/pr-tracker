<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dispatch — a quiet PR tracker</title>
  <meta name="description" content="A hand-refreshed log of pull requests across your GitHub organisations. No servers, no AI, no telemetry." />
  <meta name="color-scheme" content="light" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,30..100,0..1;1,9..144,300..900,30..100,0..1&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23f3ebd9'/%3E%3Ctext x='50%25' y='62%25' font-family='Georgia,serif' font-size='22' font-weight='900' text-anchor='middle' fill='%23232018'%3ED%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <main id="app" class="page">
    <header class="bar">
      <a class="brand" href="./" aria-label="Dispatch home">
        <span>Dispatch</span><span class="brand-dot">.</span>
      </a>
      <div class="bar-right" id="barRight"></div>
    </header>

    <section class="console" id="console" aria-label="Controls"></section>

    <section class="report" id="report" aria-live="polite"></section>

    <footer class="foot">
      <span>No servers. No AI. Token stays in this tab.</span>
      <span id="footRate">—</span>
    </footer>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
